<!DOCTYPE html>
<html>
<head>
    
    <title>Company Registration</title>
    <link rel="stylesheet" href="companyregistration.css">
</head>
<body>
    <div class="header">
        <img src="../../logo container/logoblue.png" id="logo">
        <h2>ImmersionHub</h2>
    </div>
    <h3>Register as company</h3>
    <div class="form-wrapper">
    <form id="registerForm" >
        <input type="text" placeholder="Email" id="email">
        <div class="password-wrapper">
    <input type="password" id="password" placeholder="Password">
    <span class="toggle-password" data-target="password"></span>
</div>

<div class="password-wrapper">
    <input type="password" id="confirmPassword" placeholder="Confirm Password">
    <span class="toggle-password" data-target="confirmPassword"></span>
</div>
        <input type="text" placeholder="Nanme of Supervisor" id="supervisorname">
        <input type="text" placeholder="Name of Company" id="companyname">
        <input type="text" placeholder="location of company" id="companyloc">
        <label>Upload Company Logo</label>
    <div class="upload-group">
    <label for="companyLogo" class="upload-btn">Upload Company Logo</label>
    <input type="file" id="companyLogo" accept="image/*">
    <div id="logoFileName" class="file-name">No file chosen</div>
</div>

<div class="upload-group">
    <label for="companyImage" class="upload-btn">Upload Company Image</label>
    <input type="file" id="companyImage" accept="image/*">
    <div id="imageFileName" class="file-name">No file chosen</div>
</div>
       <button class="btn-register" id="btn-reg" >Register</button>
        
</form>
    </div>
    <script src="companyregistration.js"></script>
</body>
</html>
