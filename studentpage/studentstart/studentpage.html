<!DOCTYPE html>
<html >
<head>
    <title>Document</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="studentpage.css">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
</head>
<body>
    
    <nav>
   <div class="topbar">
    <div class="left-section">
      <img src="../../logo container/logoblue.png" id="logo" alt="logo">
      <div class="logo-text">
        <h2 id="logotext">ImmersionHub</h2>
        <p id="stilogo">STI College</p>  
      </div>
      </div>
      <div class="right-section">

    <a href="#" class="profile-container">
        <img src="default.png" class="profile-pic">

        <div class="profile-info">
            <p class="profile-name">Juan Dela Cruz</p>
            <span class="profile-role">Student</span>
        </div>
    </a>
    </div>
   </div>
    
</nav>
<div class="section-container">
    <div class="calendar-wrapper">
  <div class="calendar-container">
    <div class="calendar-header">
      <img src="../../logo container/calendaricon.png" class="calendar-icon">
      <h2>Calendar</h2>
    </div>
    <div id="calendar"></div>
  </div>
</div>


    <div class="timer-container">
        <div class="timer-header">
            <img src="../../logo container/timerlogo.png" class="timer-icon" aria-readonly="true">
             <h2>Immersion Timer</h2>
        </div>
        <input type="time" id="time">
    </div>

        <div class="assignment-container">
    
    <div class="assignment-header">
        <img src="../../logo container/Assignmenticon.png" class="assignment-icon">
        <h2>Assignment</h2>
    </div>

    <div class="assignment-content">
        <p class="assignment-company" id="companyName"></p>
        <p class="assignment-status" id="assignmentStatus"></p>
    </div>

    
    <div class="assignment-todo">
       <div class="todo-card" id="todoList">
        
    </div>
    </div>
</div>
<div class="journal-card">

    <div class="journal-header">
        <img src="../../logo container/journalicon.png" class="journalicon">
        <h3 class="journal-heading">Upload Journal</h3>
    </div>

    <div class="journal-upload-box">
        <input type="file" id="journalFile" hidden>

        <button type="button" class="select-btn" id="selectFileBtn">
            Select File
        </button>

        <p class="journal-file-name" id="fileName">
            No file selected
        </p>

        <button type="button" class="upload-btn" id="uploadBtn" disabled>
            Upload
        </button>

        <p class="journal-status" id="uploadStatus"></p>
    </div>

</div>
 </div>
    <script src="studentpage.js"></script>
</body>

</html>
